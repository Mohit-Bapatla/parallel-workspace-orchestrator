version: 1
name: demo-parallel-workspace-orchestration
base_branch: main
agent:
  type: dry-run
  timeout_minutes: 5
tests:
  post_merge: npm test
merge:
  strategy: no-ff
  auto_resolve: []
batches:
  - id: batch-1
    parts:
      - id: alpha
        title: Create alpha documentation
        files:
          - docs/generated/alpha.md
        brief: Create alpha documentation for the sample repository.
        acceptance:
          - docs/generated/alpha.md exists
          - The document describes the alpha concept
      - id: beta
        title: Create beta documentation
        files:
          - docs/generated/beta.md
        brief: Create beta documentation for the sample repository.
        acceptance:
          - docs/generated/beta.md exists
          - The document describes the beta concept
  - id: batch-2
    parts:
      - id: summary
        title: Create summary documentation
        files:
          - docs/generated/summary.md
        brief: Create summary documentation that references alpha and beta conceptually.
        acceptance:
          - docs/generated/summary.md exists
          - The summary mentions both alpha and beta concepts
