version: 1
name: demo-parallel-workspace-orchestration
base_branch: main
agent:
  type: dry-run
  timeout_minutes: 5
tests:
  post_merge: npm test
merge:
  strategy: no-ff
batches:
  - id: batch-1
    parts:
      - id: alpha
        title: Generate alpha notes
        files:
          - docs/generated/alpha.md
        brief: Write the alpha section of the generated documentation.
        acceptance:
          - docs/generated/alpha.md exists.
          - The content explains the alpha scope.
      - id: beta
        title: Generate beta notes
        files:
          - docs/generated/beta.md
        brief: Write the beta section of the generated documentation.
        acceptance:
          - docs/generated/beta.md exists.
          - The content explains the beta scope.
  - id: batch-2
    parts:
      - id: summary
        title: Summarize generated notes
        files:
          - docs/generated/summary.md
        brief: Create a summary that references the alpha and beta sections.
        acceptance:
          - docs/generated/summary.md exists.
          - The summary mentions both alpha and beta outputs.
